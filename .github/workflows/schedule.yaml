name: Test Schedule
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check event
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Time: $(date)"
          echo "Schedule: ${{ github.event.schedule }}"
