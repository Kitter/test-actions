name: Post-Merge Workflow

on:
  pull_request:
    types: [closed]
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }} # 定义组名
  cancel-in-progress: false # 如果已经有正在运行的，等待它结束，而不是取消它
jobs:
  run_on_merge:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run post-merge tasks
        run: |
          echo "PR was merged into main! Running deployment..."
          ls -l
          sleep 20
  test:
    runs-on: test
    steps:
      - name: test
        run: |
          echo "=====================3"
